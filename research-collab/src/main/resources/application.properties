# ============================================================
#  Research Collaboration System - Application Config
# ============================================================

# Server
server.port=8080

# MySQL Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/pes_staff_data?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Email (Gmail SMTP - for Observer pattern notifications)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:shivakumarullagaddi855@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:garkbpqmwshcinyj}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# n8n Webhook URL (for email notification workflow)
n8n.webhook.url=${N8N_WEBHOOK_URL:https://ungravelly-tennille-unadministratively.ngrok-free.dev/webhook-test/research-update}

# Application
app.name=Research Collaboration System
app.version=1.0.0

# Logging
logging.level.com.research=INFO
logging.level.org.springframework.security=WARN

# Google Cloud & BigQuery Vector Search
google.cloud.project.id=developer-491706
google.cloud.bigquery.dataset=pes_staff_dataset
google.cloud.bigquery.table=pes_staff_info
google.cloud.bigquery.model=embedding_model
